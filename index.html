<html>

<head>
    <title>Index</title>

        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <!--obteniendo js-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</head>

<body class="bg-black">
    <!--TODO areglar barra-->
    <div class="container-fluid">
        <div class="bg-black">
            <a href="index.html" class="text-center">
                <h3>EDYNSON MUÑOZ JIMENEZ</h3>
            </a>
        </div>
        <!--TODO poner imagen centrada-->
        <div class="bg-black m-auto">
            <img class="border rounded-circle border-dark border-3" width="100" src="recursos/perfil.jpg">
        </div>
        <!-- BARRA NAVEGACIÓN -->
        <div class="bg-light">
            <nav class="navbar navbar-expand-md navbar-light bg-light border-3 border-bottom border-primary">
                <div class="container-fluid">
                    <!--BOTON PARA COLAPSAR LA PAGINA-->
                    <!--se crea un boton que se visulizara cuando la pagina se contraiga-->
                    <!--el boton sera desplegable y contendra un todos los elementos que esten identificados con un data-bs-target-->
                    <!--en este caso el identificador sera MenuNavegacion, solo las etiquetas identificadas con el id MenuNavegacion se reflejaran al desplegar el boton-->
                    <button type="button" class="navbar-toggler" data-bs-toggle="collapse"
                        data-bs-target="#MenuNavegacion">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                </div>
                <!--seccion para el menu, al estar identificado con menuNavegacion, es reconocido por nuestro boton desplegable, 
                    por tanto todo lo que este dentro de este div, aparecera al desplegar el boton-->
                <div id="MenuNavegacion" class="collapse navbar-collapse">
                    <ul class="navbar-nav ms-3">
                        <li class="nav-item">
                            <a class="nav-link active" href="index.html">Inicio</a>
                        </li>
                        <li class="nav-item">

                        </li>
                        <li class="nav-item">

                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="">pagina4</a>
                        </li>

                    </ul>
                </div>
            </nav>
        </div>
</body>

</html>
